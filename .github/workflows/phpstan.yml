name: PHPStan

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '*'

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@2.35.5
        with:
          php-version: '8.3'

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --error-format=github
