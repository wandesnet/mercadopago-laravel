name: tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
            - release/**

jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: true
            matrix:
                os: [ubuntu-latest]
                php: [8.4, 8.3, 8.2, 8.1]
                laravel: [13.*, 12.*, 11.*, 10.*]
                include:
                    - laravel: 13.*
                      testbench: 11.*
                    - laravel: 12.*
                      testbench: 10.*
                    - laravel: 11.*
                      testbench: 9.*
                    - laravel: 10.*
                      testbench: 8.*
                exclude:
                    - laravel: 13.*
                      php: 8.2
                    - laravel: 13.*
                      php: 8.1
                    - laravel: 12.*
                      php: 8.1
                    - laravel: 11.*
                      php: 8.1

        name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.os }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@2.35.5
              with:
                  php-version: ${{ matrix.php }}
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
                  coverage: none

            - name: Setup problem matchers
              run: |
                  echo "::add-matcher::${{ runner.tool_cache }}/php.json"
                  echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

            - name: Install dependencies
              run: |
                  composer update --prefer-stable --with=laravel/framework:${{ matrix.laravel }} --with=orchestra/testbench:${{ matrix.testbench }} --prefer-dist --no-interaction --no-progress

            - name: Execute pint
              run: vendor/bin/pint --test

            - name: Execute tests
              run: vendor/bin/pest
